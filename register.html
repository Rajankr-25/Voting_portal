<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h2>User Registeration</h2>

    <form id="registerForm">

        <!-- Name -->
        <input
            type="text"
            id="name"
            placeholder="Enter Name"
            required
        >

        <!-- Email -->
        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required
        >

        <!-- Password -->
        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <!-- Submit Button -->
        <button type="submit">
            Register
        </button>

    </form>

    <br>  

    <p>
        Already have an account?
        <a href="login.html">
            Login here
        </a>
    </p>

</div>

<script src="./js/register.js"></script>

</body>
</html>
