<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h2>Admin Dashboard</h2>

    <!-- Logout Button -->
    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

    <br><br>

    <!-- Add Candidate Section -->
    <h3>Add Candidate</h3>

    <form id="candidateForm">

        <input
            type="text"
            id="name"
            placeholder="Candidate Name"
            required
        >

        <input
            type="text"
            id="party"
            placeholder="Party Name"
            required
        >

        <button type="submit">
            Add Candidate
        </button>

    </form>

    <br>

    <button onclick="viewCandidates()">
        View Candidates
    </button>

    <button onclick="viewVoters()">
        View Voter List
    </button>

    <br><br>

    <!-- Display Area -->

    <div id="candidateList"></div>

    <div id="voterList"></div>

</div>

<script src="js/admin.js"></script>
<script src="js/logout.js"></script>

</body>

</html>
