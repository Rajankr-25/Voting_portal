<!DOCTYPE html>

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h2>Login</h2>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <br>
         
        <p>
            Don't have an account?
            <a href="register.html">
                Register here
            </a>
        </p>
